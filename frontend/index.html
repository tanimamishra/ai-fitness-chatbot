<!DOCTYPE html>
<html>
<head>
<title>AI Fitness Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>
  
<body>

<div class="chat-container">

<h1>AI Fitness Chatbot</h1>

<p>Ask your fitness questions (diet, workout, muscle gain, weight loss)</p>

<div class="chat-box">
<div id="chatMessages">
<p class="bot-message">AI Fitness Coach: Hello! Ask me any fitness question.</p>
</div>
</div>

<input id="userInput" placeholder="Type your fitness question">

<button onclick="sendMessage()">Send</button>

</div>

<script src="script.js"></script>

</body>
</html>
